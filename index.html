<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samify CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--surf:#0d0d1a;--card:#121220;--border:#1c1c30;--border2:#242440;--acc:#f0a020;--acc2:rgba(240,160,32,.12);--pur:#8b80ff;--pur2:rgba(139,128,255,.11);--txt:#ddddf5;--dim:#6a6a98;--faint:#2e2e50;--ok:#34d399;--warn:#fbbf24;--err:#f87171;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);display:flex;height:100vh}

/* SIDEBAR */
.side{width:224px;min-width:224px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;height:100vh;position:fixed;left:0;top:0;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.logo-area{padding:20px 18px 18px;border-bottom:1px solid var(--border)}
.logo-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--acc);letter-spacing:-.4px}
.logo-sub{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.nav-wrap{flex:1;overflow-y:auto;padding:10px 0}
.nav-sec{padding:0 10px;margin-bottom:4px}
.nav-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--faint);padding:10px 10px 5px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--dim);font-size:13.5px;font-weight:500;transition:all .12s;user-select:none}
.ni:hover{background:var(--border);color:var(--txt)}
.ni.on{background:var(--acc2);color:var(--acc)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.ni.on svg{opacity:1}
.nbadge{margin-left:auto;background:var(--err);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px}
.nbadge.ok{background:var(--ok);color:#000}
.side-footer{padding:14px 16px;border-top:1px solid var(--border)}
.side-version{font-size:10px;color:var(--faint)}

/* MAIN */
.main{margin-left:224px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{background:var(--surf);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ai-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ok);background:rgba(52,211,153,.09);padding:4px 10px;border-radius:20px;white-space:nowrap}
.ai-dot{width:5px;height:5px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.ava{width:31px;height:31px;border-radius:50%;background:var(--acc2);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:10.5px;font-weight:800;color:var(--acc);flex-shrink:0}
.mbtn{display:none;width:32px;height:32px;background:var(--border);border:none;border-radius:7px;cursor:pointer;color:var(--txt);font-size:16px;align-items:center;justify-content:center;flex-shrink:0}

.content{flex:1;overflow-y:auto;padding:22px;min-width:0}

/* STAT GRID */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:17px 18px;position:relative;overflow:hidden;transition:border-color .15s}
.scard:hover{border-color:var(--border2)}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.c-acc::after{background:var(--acc)}
.scard.c-pur::after{background:var(--pur)}
.scard.c-ok::after{background:var(--ok)}
.scard.c-warn::after{background:var(--warn)}
.slabel{font-size:9.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim);font-weight:700;margin-bottom:8px}
.sval{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-1px;line-height:1}
.sdelta{font-size:11px;margin-top:6px;color:var(--dim)}
.sdelta.up{color:var(--ok)}.sdelta.dn{color:var(--err)}

/* LAYOUT GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:0}
.card-hd{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-ht{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.2px}
.card-body{padding:15px 17px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--dim);padding:9px 13px;border-bottom:1px solid var(--border);font-weight:700}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.018)}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bdg-ok{background:rgba(52,211,153,.11);color:var(--ok)}
.bdg-warn{background:rgba(251,191,36,.11);color:var(--warn)}
.bdg-err{background:rgba(248,113,113,.11);color:var(--err)}
.bdg-info{background:var(--pur2);color:var(--pur)}
.bdg-neu{background:var(--border);color:var(--dim)}
.bdg-acc{background:var(--acc2);color:var(--acc)}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--acc);color:#000}.btn-p:hover{filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--dim);border:1px solid var(--border)}.btn-g:hover{color:var(--txt);border-color:var(--border2)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-pur{background:var(--pur2);color:var(--pur);border:none}.btn-pur:hover{background:rgba(139,128,255,.2)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:0;overflow-x:auto}
.tab{padding:9px 15px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--txt)}.tab.on{color:var(--acc);border-color:var(--acc)}

/* DROP ZONE */
.dz{border:2px dashed var(--border2);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:all .18s;margin-bottom:16px}
.dz:hover,.dz.over{border-color:var(--acc);background:var(--acc2)}
.dz-ico{font-size:26px;margin-bottom:10px;opacity:.45}
.dz-t{font-size:13px;color:var(--dim);line-height:1.6}
.dz-t b{color:var(--acc)}

/* KANBAN */
.kb-board{display:flex;gap:10px;overflow-x:auto;height:calc(100vh - 156px);padding-bottom:10px}
.kb-col{min-width:215px;max-width:215px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;max-height:100%}
.kb-hd{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kb-ht{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.kb-cnt{font-size:10px;color:var(--dim);background:var(--border);padding:2px 6px;border-radius:10px}
.kb-cards{padding:7px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.kb-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px;cursor:pointer;transition:border-color .12s}
.kb-card:hover{border-color:var(--acc)}
.kb-co{font-size:12.5px;font-weight:700;margin-bottom:2px}
.kb-ct{font-size:11px;color:var(--dim);margin-bottom:7px}
.kb-note{font-size:10.5px;color:var(--dim);line-height:1.5;margin-bottom:7px}
.kb-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc);font-weight:500}
.kb-dt{font-size:9.5px;color:var(--faint);margin-top:6px}
.kb-footer{padding:7px;border-top:1px solid var(--border);flex-shrink:0}

/* CALENDAR */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.cal-month{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;min-width:160px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;gap:1px;background:var(--border)}
.cal-dh{background:var(--surf);padding:8px;text-align:center;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.cal-d{background:var(--card);min-height:80px;padding:6px;cursor:pointer;transition:background .1s}
.cal-d:hover{background:var(--surf)}.cal-d.today{background:var(--acc2)}.cal-d.om{opacity:.25}
.cal-dn{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:3px}
.cal-ev{background:var(--pur2);border-left:2px solid var(--pur);padding:1px 4px;border-radius:2px;font-size:9px;color:var(--pur);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev.pay{background:var(--acc2);border-color:var(--acc);color:var(--acc)}

/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:7px}
.tl-item{display:flex;align-items:center;gap:11px;padding:10px;border-radius:8px;background:var(--surf);border:1px solid var(--border)}
.tl-date{min-width:34px;text-align:center;flex-shrink:0}
.tl-day{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;color:var(--acc);line-height:1}
.tl-mon{font-size:8.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim)}
.tl-info{flex:1;min-width:0}
.tl-cl{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-ds{font-size:10.5px;color:var(--dim);margin-top:1px}
.tl-am{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;white-space:nowrap;text-align:right}

/* BARS */
.bars{display:flex;align-items:flex-end;gap:5px;height:100px;padding:6px 0}
.bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar{width:100%;background:linear-gradient(to top,var(--acc),rgba(240,160,32,.4));border-radius:3px 3px 0 0;min-height:3px;transition:opacity .2s}
.bar:hover{opacity:.8}
.bar-l{font-size:9px;color:var(--faint);font-family:'JetBrains Mono',monospace}

/* AI CHAT */
.ai-chat-box{display:flex;flex-direction:column;height:360px;overflow:hidden}
.ai-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.ai-m{max-width:90%;padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.65}
.ai-m.bot{background:var(--surf);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.ai-m.usr{background:var(--acc2);border:1px solid rgba(240,160,32,.25);align-self:flex-end;border-bottom-right-radius:3px;color:var(--acc)}
.ai-inp-row{display:flex;gap:7px;padding:9px 12px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0}
.ai-inp{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.ai-inp:focus{border-color:var(--acc)}.ai-inp::placeholder{color:var(--faint)}

/* CUSTOMERS */
.cu-wrap{display:grid;grid-template-columns:198px 1fr;gap:14px;height:calc(100vh - 144px)}
.cu-list{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow-y:auto}
.cu-item{padding:12px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .1s}
.cu-item:last-child{border-bottom:none}
.cu-item:hover{background:var(--border)}
.cu-item.on{background:var(--acc2);border-left:3px solid var(--acc)}
.cu-name{font-size:12.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cu-mrr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc)}

/* PROGRESS */
.prog{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;background:linear-gradient(to right,var(--acc),#ffc840);border-radius:3px;transition:width .6s ease}

/* CONTRACT CARD */
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;transition:border-color .12s}
.cc:hover{border-color:var(--border2)}
.cc-name{font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;margin-bottom:2px}
.cc-meta{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0}
.cc-mk{display:flex;flex-direction:column;gap:2px}
.cc-ml{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
.cc-mv{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt)}

/* SECTION HEADER */
.shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.sht{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700}

/* FORECAST */
.fi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
.fi-l{font-size:12.5px}
.fi-v{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--acc)}

/* AI INSIGHTS */
.ai-insight{padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px;line-height:1.65}
.ai-insight:last-child{border-bottom:none}

/* KANBAN DRAG & DROP */
.kb-card[draggable]{cursor:grab}
.kb-card[draggable]:active{cursor:grabbing}
.kb-card.dragging{opacity:.35;transform:scale(.97);border-style:dashed}
.kb-cards.drag-over{background:rgba(240,160,32,.06);border-radius:8px;outline:2px dashed var(--acc);outline-offset:-4px}
.kb-col.drag-over .kb-cards{background:rgba(240,160,32,.06);border-radius:8px;outline:2px dashed var(--acc);outline-offset:-4px}

/* CODE */
.code-block{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:13px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ok);overflow-x:auto;white-space:pre;line-height:1.7;margin-bottom:12px}

/* PROJECT STEPS */
.proj-step{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid var(--border)}
.proj-step:last-child{border-bottom:none}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}
.overlay.show{display:block}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* NOTIFICATION DOT */
.notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--err);border-radius:50%;border:1.5px solid var(--surf)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:13px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.form-input:focus{border-color:var(--acc)}

/* DEMO MODE */
.demo-badge{background:linear-gradient(135deg,#f0a020,#ff6b35);color:#000;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.5px;cursor:pointer;transition:opacity .15s;border:none;font-family:'DM Sans',sans-serif}
.demo-badge:hover{opacity:.8}
body.demo-active .logo-name::after{content:' DEMO';font-size:9px;color:#ff6b35;margin-left:4px}

/* HEALTH METER */
.health-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700}
.health-hi{background:rgba(52,211,153,.13);color:var(--ok)}
.health-md{background:rgba(251,191,36,.13);color:var(--warn)}
.health-lo{background:rgba(248,113,113,.13);color:var(--err)}

/* ACTIVITY LOG */
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-ico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.act-body{flex:1;min-width:0}
.act-text{font-size:13px;line-height:1.6}
.act-meta{font-size:10px;color:var(--faint);margin-top:2px}

/* MEETING BRIEF */
.brief-btn{background:var(--pur2);border:none;color:var(--pur);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.brief-btn:hover{background:rgba(139,128,255,.2)}

/* NOTIFICATION BAR */
.notif-bar{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:var(--r);padding:12px 16px;margin-bottom:16px}
.notif-item{font-size:12.5px;line-height:1.6;padding:4px 0;border-bottom:1px solid rgba(251,191,36,.12);cursor:pointer}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{color:var(--acc)}
.notif-item.err{color:var(--err)}

/* RESPONSIVE */
@media(max-width:768px){
  .side{transform:translateX(-100%)}
  .side.open{transform:translateX(0)}
  .main{margin-left:0}
  .sgrid{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .cu-wrap{grid-template-columns:1fr;height:auto}
  .cu-list{max-height:160px;overflow-y:auto;display:flex;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;border-radius:var(--r)}
  .cu-item{min-width:130px;border-bottom:none;border-right:1px solid var(--border)}
  .cu-item.on{border-left:none;border-bottom:3px solid var(--acc)}
  .topbar{padding:0 13px}
  .content{padding:13px}
  .mbtn{display:flex!important}
  .ai-pill{display:none}
  .kb-board{height:calc(100vh - 180px)}
  .cal-grid .cal-d{min-height:56px}
  .cc-meta{gap:10px}
  .modal{padding:18px;max-height:92vh}
  .sgrid{gap:8px}
  .sval{font-size:22px}
  .tabs{gap:0}
  .tab{padding:8px 10px;font-size:12px}
  .tbl th,.tbl td{padding:8px 10px}
}
@media(max-width:480px){
  .sgrid{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .sval{font-size:20px}
  .kb-board{gap:7px}
  .kb-col{min-width:190px}
  .content{padding:10px}
  .topbar{height:48px}
  .side{width:200px;min-width:200px}
  .notif-bar{padding:10px 12px}
  .cal-grid{font-size:9px}
}
</style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeSide()"></div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>

<!-- SIDEBAR -->
<aside class="side" id="side">

function calcHealth(client) {
  let score = 100;
  const reasons = [];
  // Overdue invoice?
  if (invoices.some(i=>i.cl===client.n && i.st==='overdue')) { score-=30; reasons.push('Förfallen faktura'); }
  // Contract expiring <90d?
  const contract = contracts.find(c=>c.cl===client.n);
  if (contract) {
    const daysLeft = Math.round((new Date(contract.en)-new Date())/(1000*60*60*24));
    if (daysLeft<90 && daysLeft>=0) { score-=20; reasons.push(`Avtal löper ut om ${daysLeft}d`); }
  }
  // No activity in 30 days?
  const lastAct = activityLog.filter(a=>a.cl===client.n).sort((a,b)=>new Date(b.at)-new Date(a.at))[0];
  if (!lastAct || (new Date()-new Date(lastAct.at))>30*24*60*60*1000) { score-=15; reasons.push('Ingen aktivitet på 30+ dagar'); }
  // No time entries in 14 days?
  const lastTime = timeEntries.filter(t=>t.cl===client.n).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  if (!lastTime || (new Date()-new Date(lastTime.date))>14*24*60*60*1000) { score-=10; reasons.push('Inget arbete loggat på 14+ dagar'); }
  score = Math.max(0, score);
  const cls = score>=80?'health-hi':score>=50?'health-md':'health-lo';
  const emoji = score>=80?'✓':score>=50?'⚠':'⛔';
  return {score, cls, emoji, reasons};
}

function renderNotifications() {
  const today = new Date();
  const expiring = contracts.filter(c => {
    const daysLeft = Math.round((new Date(c.en) - today) / (1000*60*60*24));
    return daysLeft >= 0 && daysLeft <= 90;
  });
  const overdueInvs = invoices.filter(i => i.st === 'overdue');
  if (!expiring.length && !overdueInvs.length) return '';

  const items = [
    ...expiring.map(c => {
      const d = Math.round((new Date(c.en) - today) / (1000*60*60*24));
      return `<div class="notif-item" onclick="go('avtal')">
        🔔 <b>${c.cl}</b> — avtal löper ut om <b>${d} dagar</b> (${c.en}) · ${fmtSEK(c.sv)} kr/mån
      </div>`;
    }),
    ...overdueInvs.map(i => `<div class="notif-item err" onclick="go('fakt')">
      ⚠️ <b>${i.cl}</b> — förfallen faktura <b>${fmt(i.am)}</b> sedan ${i.due}
    </div>`),
  ].join('');

  return `<div class="notif-bar" id="notif-bar">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div style="flex:1">${items}</div>

}

async function markPaid(id) {

  render();
  await sbPatch('invoices', id, {status: 'paid'});
}

async function sendReminder(invoiceId) {
  const inv = invoices.find(i => i.id === invoiceId);
  if (!inv) return;
  const client = clients.find(c => c.n === inv.cl);

  // Show generating state
  showToast(`🤖 AI genererar påminnelse till ${inv.cl}...`);

  const daysOverdue = Math.round((new Date() - new Date(inv.due)) / (1000*60*60*24));
  const overdueTxt = daysOverdue > 0 ? `Fakturan förföll för ${daysOverdue} dagar sedan.` : `Fakturan förfaller ${inv.due}.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Du är Rasmus på Samify (ZicLun AB). Skriv ett professionellt, vänligt men tydligt betalningspåminnelse-mail på svenska. 
Avsändare: Rasmus Larsson, Samify / ZicLun AB, rasmus@samify.se
Inga hälsningsfras som "Hoppas du har det bra" — gå rakt på sak. Avsluta med betalningsinformation: Bankgiro 1234-5678, märk betalningen med fakturanummer. Signera med Rasmus Larsson, Samify.
Returnera BARA mejlets body-text, ingen subject-rad, inga extra kommentarer.`,
        messages: [{
          role: 'user',
          content: `Skriv betalningspåminnelse till:
Kontaktperson: ${client?.ct || inv.cl}
Företag: ${inv.cl}
Belopp: ${fmtSEK(inv.am)} kr
Kategori: ${inv.cat || 'Månadsavgift'}
Förfallodatum: ${inv.due}
${overdueTxt}
Status: ${inv.st === 'overdue' ? 'FÖRFALLEN' : 'Betalning ej registrerad'}`
        }]
      })
    });
    const data = await res.json();
    const emailBody = data.content?.[0]?.text || '';
    const subject = `Betalningspåminnelse — ${inv.cl} — ${fmtSEK(inv.am)} kr`;
    const toEmail = client?.email || '';

    // Open Gmail compose with pre-filled content
    const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(toEmail)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
    window.open(gmailUrl, '_blank');

    // Log reminder in Supabase
    const now = new Date().toISOString();
    inv.reminderSent = now;
    await sbPatch('invoices', invoiceId, {reminder_sent_at: now});
    render();
    showToast(`✓ Gmail öppnat med påminnelse till ${inv.cl}`);

  } catch(e) {
    showToast('⚠️ Kunde inte generera påminnelse — kontrollera anslutning');
  }
}

  const due = document.getElementById('m-due').value;

  render();
}

          <div class="fi"><span class="fi-l">Tjänst</span><span style="color:var(--txt);text-align:right;max-width:55%">${c.svc}</span></div>
          <div class="fi"><span class="fi-l">Avtalsstart</span><span style="font-family:'JetBrains Mono',monospace">${c.cs}</span></div>

        <div class="card-hd"><span class="card-ht">Beskrivning</span></div>
        <div class="card-body"><div style="font-size:13px;line-height:1.75;color:var(--dim)">${c.desc}</div></div>
      </div>`;
  } else if (t==='Projekt') {
    const stages = ['Kartläggning','Prototyp','Driftsättning','Löpande support'];
    const pcts = [25,50,75,100];
    content = `
      <div class="card" style="margin-bottom:12px">
        <div class="card-hd"><span class="card-ht">Samify-metoden — Projektstatus</span><span class="bdg bdg-acc">${c.ph}% klart</span></div>
        <div class="card-body" style="padding:12px 17px">
          ${stages.map((s,i) => {
            const done = c.ph >= pcts[i];
            const cur = c.ph >= (pcts[i-1]||0) && c.ph < pcts[i];
            const bg = done?'var(--ok)':cur?'var(--acc)':'var(--border2)';
            const col = done||cur?'#000':'var(--dim)';
            return `<div class="proj-step">
              <div class="step-circle" style="background:${bg};color:${col}">${done?'✓':i+1}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;color:${done?'var(--ok)':cur?'var(--acc)':'var(--dim)'}">${s}</div>
                <div style="font-size:11px;color:var(--faint)">${done?'Slutförd':cur?'Pågående':'Ej påbörjad'}</div>
              </div>
              ${cur?'<span class="bdg bdg-warn">Aktiv</span>':done?'<span class="bdg bdg-ok">✓</span>':''}
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-ht">Anteckningar & milstolpar</span><button class="btn btn-g btn-sm">+ Lägg till</button></div>
        <div class="card-body" style="color:var(--dim);font-size:13px;text-align:center;padding:24px 0">Inga anteckningar. Lägg till möten, beslut och milstolpar.</div>
      </div>`;
  } else if (t==='Tid') {
    const clientEntries = timeEntries.filter(e=>e.cl===c.n).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const totalH = clientEntries.reduce((a,e)=>a+e.hours,0);
    const adnanH = clientEntries.filter(e=>e.owner==='Adnan').reduce((a,e)=>a+e.hours,0);
    const rasmusH = clientEntries.filter(e=>e.owner==='Rasmus').reduce((a,e)=>a+e.hours,0);
    const rows = clientEntries.map(e=>`<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.date}</td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--acc)">${e.hours}h</td>
      <td style="font-size:12.5px">${e.desc||'—'}</td>
      <td><span class="bdg bdg-neu">${e.owner}</span></td>
      <td><button class="btn btn-g btn-sm" onclick="deleteTimeEntry('${e.id}')">✕</button></td>
    </tr>`).join('');
    content = `
      <div class="g3" style="margin-bottom:14px">
        <div class="scard c-acc"><div class="slabel">Totalt loggat</div><div class="sval" style="font-size:20px">${totalH}h</div><div class="sdelta">${clientEntries.length} poster</div></div>
        <div class="scard c-pur"><div class="slabel">Adnan</div><div class="sval" style="font-size:20px">${adnanH}h</div></div>
        <div class="scard c-ok"><div class="slabel">Rasmus</div><div class="sval" style="font-size:20px">${rasmusH}h</div></div>

        <div class="card-hd">
          <span class="card-ht">Tidslogg — ${c.n}</span>

  } else if (t==='Logg') {
    const logs = activityLog.filter(a=>a.cl===c.n).sort((a,b)=>new Date(b.at)-new Date(a.at));
    const typeIco = {note:'📝',decision:'✅',next_step:'➡️',meeting:'🤝',email:'📧'};

    const typeBg = {note:'var(--border)',decision:'var(--pur2)',next_step:'var(--acc2)',meeting:'rgba(52,211,153,.12)',email:'var(--pur2)'};
    const logRows = logs.map(a=>`<div class="act-item">
      <div class="act-ico" style="background:${typeBg[a.type]||'var(--border)'}">${typeIco[a.type]||'📝'}</div>

        <div class="act-text">${a.content}</div>

    content = `<div class="card">
      <div class="card-hd">
        <span class="card-ht">Aktivitetslogg — ${c.n}</span>

      </div>
    </div>`;
  } else if (t==='Lönsamhet') {
    const clientTE = timeEntries.filter(e=>e.cl===c.n);
    const totalH = clientTE.reduce((a,e)=>a+e.hours,0);
    const internalRate = 850; // kr/h intern kostnad
    const costH = Math.round(totalH * internalRate);
    const grossMargin = c.mrr - costH;
    const marginPct = totalH > 0 ? Math.round((grossMargin/c.mrr)*100) : 100;
    const impliedRate = totalH > 0 ? Math.round(c.mrr/totalH) : 0;
    content = `
      <div class="g3" style="margin-bottom:14px">
        <div class="scard c-acc"><div class="slabel">MRR</div><div class="sval" style="font-size:19px">${fmtSEK(c.mrr)}</div><div class="sdelta">intäkt/mån</div></div>
        <div class="scard ${grossMargin>=0?'c-ok':'c-err'}"><div class="slabel">Bruttomarginal</div><div class="sval" style="font-size:19px;color:${grossMargin>=0?'var(--ok)':'var(--err)'}">${fmtSEK(grossMargin)}</div><div class="sdelta">${marginPct}% marginal</div></div>
        <div class="scard c-pur"><div class="slabel">Timkostnad/mån</div><div class="sval" style="font-size:19px">${fmtSEK(costH)}</div><div class="sdelta">${totalH}h à ${fmtSEK(internalRate)} kr</div></div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-ht">Lönsamhetsanalys</span><button class="btn btn-g btn-sm" onclick="setKTab('Tid')">Logga tid</button></div>
        <div class="card-body">
          <div class="fi"><span class="fi-l">Totalt loggade timmar</span><span style="font-family:'JetBrains Mono',monospace">${totalH}h</span></div>
          <div class="fi"><span class="fi-l">Intern timkostnad (à 850 kr/h)</span><span style="font-family:'JetBrains Mono',monospace;color:var(--err)">-${fmtSEK(costH)} kr</span></div>
          <div class="fi"><span class="fi-l">Effektiv timintäkt</span><span style="font-family:'JetBrains Mono',monospace;color:var(--acc)">${impliedRate>0?fmtSEK(impliedRate)+' kr/h':'Sätt timmar för att räkna'}</span></div>
          <div class="fi"><span class="fi-l">Bruttomarginal denna månaden</span><span style="font-family:'JetBrains Mono',monospace;color:${grossMargin>=0?'var(--ok)':'var(--err)'}">${fmtSEK(grossMargin)} kr</span></div>
          ${totalH===0?'<div style="color:var(--faint);font-size:12px;margin-top:10px;padding:10px;background:var(--surf);border-radius:6px">Logga timmar under Tid-fliken för att se lönsamhetsberäkning.</div>':''}
        </div>
      </div>`;
  } else if (t==='Dokument') {
    const docs = [{n:'Signerat avtal',ty:'PDF',dt:'2025-01-15',sz:'245 KB'},{n:'GDPR-DPA',ty:'PDF',dt:'2025-01-15',sz:'180 KB'},{n:'Teknisk specifikation',ty:'HTML',dt:'2025-01-20',sz:'42 KB'},{n:'Projektoffert',ty:'PDF',dt:'2025-01-10',sz:'320 KB'}];
    content = `<div class="card">
      <div class="card-hd"><span class="card-ht">Dokument — ${c.n}</span><button class="btn btn-p btn-sm">+ Ladda upp</button></div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Dokument</th><th>Typ</th><th>Datum</th><th>Storlek</th><th></th></tr></thead>
        <tbody>${docs.map(d=>`<tr>
          <td><span style="margin-right:7px">${d.ty==='PDF'?'📄':'📝'}</span><b>${d.n}</b></td>
          <td><span class="bdg bdg-neu">${d.ty}</span></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11.5px">${d.dt}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--dim)">${d.sz}</td>
          <td><button class="btn btn-g btn-sm">Visa</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  } else if (t==='Kod') {
    const slug = c.n.toLowerCase().replace(/\s+/g,'-').replace(/[åä]/g,'a').replace(/ö/g,'o');
    content = `<div class="card">
      <div class="card-hd"><span class="card-ht">Kodlager — ${c.n}</span><button class="btn btn-p btn-sm">+ Lägg till snippet</button></div>
      <div class="card-body">
        <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Deploy-script</div>
        <div class="code-block">&lt;!-- Samify Widget för ${c.n} --&gt;
&lt;script
  src="https://samify-widget.netlify.app/widget.js"
  data-client="${slug}"
  data-theme="#f0a020"&gt;
&lt;/script&gt;</div>
        <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Netlify Function (Claude Proxy)</div>
        <div class="code-block">// netlify/functions/claude-proxy.js
const resp = await fetch(
  'https://api.anthropic.com/v1/messages',
  {
    headers: {
      'x-api-key': process.env.ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify(req.body)
  }
)</div>
      </div>
    </div>`;
  } else if (t==='AI-assistent') {
    const msgs = S.chat.length===0
      ? `<div class="ai-m bot">Hej! Jag är din AI-assistent för <b>${c.n}</b>.<br>Jag känner till kundens avtal, tjänster och projektstatus. Fråga mig om nästa steg, merförsäljning eller idéer! 💡</div>`
      : S.chat.map(m=>`<div class="ai-m ${m.role==='user'?'usr':'bot'}">${m.content}</div>`).join('');
    content = `<div class="card">
      <div class="card-hd"><span class="card-ht">AI-assistent — ${c.n}</span><span class="ai-pill"><span class="ai-dot"></span>Claude AI</span></div>
      <div class="ai-chat-box">
        <div class="ai-msgs" id="ai-msgs">${msgs}</div>
        <div class="ai-inp-row">
          <input class="ai-inp" id="ai-in" placeholder="Fråga om ${c.n}..." onkeydown="if(event.key==='Enter')aiSend()">
          <button class="btn btn-p" onclick="aiSend()">Skicka</button>
        </div>
      </div>
    </div>`;
  }

  return `<div class="cu-wrap">
    <div class="cu-list">${cuList}</div>
    <div style="display:flex;flex-direction:column;min-height:0">
      <div style="margin-bottom:14px">
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:5px">${c.n}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="bdg bdg-ok">Aktiv kund</span>
          <span class="bdg bdg-info">${c.svc}</span>
        </div>
      </div>
      <div class="tabs" style="margin-bottom:14px">${tabsHTML}</div>
      <div style="overflow-y:auto;flex:1">${content}</div>
    </div>
  </div>`;
}

function showLogTimeModal(clientName) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">⏱️ Logga tid — ${clientName}</div>
    <div class="form-group"><label class="form-label">Datum</label>
      <input class="form-input" id="lt-date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>

    <div class="form-group"><label class="form-label">Beskrivning</label>
      <input class="form-input" id="lt-desc" placeholder="Vad gjordes?"></div>
    <div class="form-group"><label class="form-label">Vem</label>
      <select class="form-input" id="lt-owner">
        <option value="Adnan">Adnan</option>
        <option value="Rasmus">Rasmus</option>
      </select></div>

      <button class="btn btn-p" onclick="saveTimeEntry('${clientName.replace(/'/g,"\\'")}')">Spara</button>
      <button class="btn btn-g" onclick="closeModal()">Avbryt</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
}

async function saveTimeEntry(clientName) {
  const date  = document.getElementById('lt-date').value;
  const hours = parseFloat(document.getElementById('lt-hours').value);
  const desc  = document.getElementById('lt-desc').value;
  const owner = document.getElementById('lt-owner').value;
  if (!date || !hours) return;
  closeModal();
  const rows = await sbPost('time_entries', {client_name:clientName, date, hours, description:desc, owner});
  if (rows && rows[0]) timeEntries.unshift(mapTimeEntries([rows[0]])[0]);
  else timeEntries.unshift({id:Date.now(), cl:clientName, date, hours, desc, owner});
  render();
  showToast(`✓ ${hours}h loggat för ${clientName}`);
}

async function deleteTimeEntry(id) {
  timeEntries = timeEntries.filter(e=>e.id!==id);
  render();
  await sbDelete('time_entries', id);
}

    <div class="form-group"><label class="form-label">Innehåll</label>

    <div class="form-group"><label class="form-label">Vem</label>

      <button class="btn btn-g" onclick="closeModal()">Avbryt</button>
    </div>`;

async function saveActivity(clientName, dealCompany) {
  const type    = document.getElementById('al-type').value;
  const content = document.getElementById('al-content').value.trim();
  const owner   = document.getElementById('al-owner').value;
  if (!content) return;
  closeModal();
  const body = {type, content, owner};
  if (clientName)  body.client_name  = clientName;
  if (dealCompany) body.deal_company = dealCompany;
  const rows = await sbPost('activity_log', body);
  const entry = rows?.[0] ? mapActivityLog([rows[0]])[0] : {id:Date.now(), cl:clientName||null, deal:dealCompany||null, type, content, owner, at:new Date().toISOString()};
  activityLog.unshift(entry);
  render();
  showToast(`✓ Aktivitet sparad`);
}

function renderPipe() {
  const cols = kbCols.map(col => {
    const cards = pipeline.filter(p=>p.ph===col.id);
    const colTotal = cards.reduce((a,p)=>a+p.val,0);
    const cardHTML = cards.map(p=>`<div
      class="kb-card"
      draggable="true"
      data-co="${p.co.replace(/"/g,'&quot;')}"
      ondragstart="kbDragStart(event,'${p.co.replace(/'/g,"\\'")}' )"
      ondragend="kbDragEnd(event)"
      onclick="kbCardClick(event,'${p.co.replace(/'/g,"\\'")}' )"
    >
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
        <span style="font-size:9px;color:var(--faint);cursor:grab">⠿⠿</span>
        <div class="kb-co">${p.co}</div>
      </div>
      <div class="kb-ct">${p.ct}</div>
      <div class="kb-note">${p.note}</div>
      <div class="kb-val">${fmt(p.val)}</div>
      <div class="kb-dt">${p.dt}</div>
    </div>`).join('');
    return `<div class="kb-col" data-ph="${col.id}">
      <div class="kb-hd">
        <span class="kb-ht" style="color:${col.color}">${col.label}</span>
        <span class="kb-cnt">${cards.length}</span>
      </div>
      <div class="kb-cards"
        data-ph="${col.id}"
        ondragover="kbDragOver(event)"
        ondragleave="kbDragLeave(event)"
        ondrop="kbDrop(event,'${col.id}')"
      >${cardHTML||`<div class="kb-drop-hint" style="padding:16px;text-align:center;font-size:11px;color:var(--faint)">Tom</div>`}</div>
      ${colTotal>0?`<div class="kb-footer" style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;color:var(--acc);text-align:center">${fmt(colTotal)}</div>`:''}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <span class="bdg bdg-acc">Pipeline: ${fmt(pipeActive())}</span>
        <span class="bdg bdg-ok">${pipeline.filter(p=>p.ph!=='förlorad').length} aktiva deals</span>
        <span class="bdg bdg-warn">${pipeline.filter(p=>p.ph==='offert').length} offert/ar ute</span>
      </div>
      <button class="btn btn-p btn-sm" onclick="showNewDealModal()">+ Ny deal</button>
    </div>
    <div class="kb-board">${cols}</div>`;
}

async function saveNewDeal() {
  const co=document.getElementById('m-co').value;
  const ct=document.getElementById('m-ct').value;
  const val=parseFloat(document.getElementById('m-val').value)||0;
  const ph=document.getElementById('m-ph').value;
  const note=document.getElementById('m-note').value;
  if(!co||!val) return;
  closeModal();
  const today = new Date().toISOString().split('T')[0];
  const rows = await sbPost('pipeline', {company:co, contact_name:ct, value:val, phase:ph, deal_date:today, note});
  if (rows && rows[0]) pipeline.push(mapPipeline([rows[0]])[0]);
  else pipeline.push({id:Date.now(), co, ct, val, ph, dt:today, note});
  render();
}

async function moveDeal(co) {

// ─── KANBAN DRAG & DROP ───────────────────────────────
function kbDragStart(e, co) {
  S.dragCo = co;
  S.dragging = true;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', co);
  // Slight delay so the card renders before it fades
  setTimeout(() => { if(e.target) e.target.classList.add('dragging'); }, 0);
}

function kbDragEnd(e) {
  S.dragging = false;
  S.dragCo = null;
  if (e.target) e.target.classList.remove('dragging');
  document.querySelectorAll('.kb-cards').forEach(el => el.classList.remove('drag-over'));
}

function kbDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  col.classList.add('drag-over');
}

function kbDragLeave(e) {
  // Only remove if actually leaving the column (not entering a child)
  const col = e.currentTarget;
  if (!col.contains(e.relatedTarget)) {
    col.classList.remove('drag-over');
  }
}

async function kbDrop(e, ph) {
  e.preventDefault();
  document.querySelectorAll('.kb-cards').forEach(el => el.classList.remove('drag-over'));
  const co = S.dragCo || e.dataTransfer.getData('text/plain');
  if (!co) return;
  const deal = pipeline.find(p => p.co === co);
  if (deal && deal.ph !== ph) {
    deal.ph = ph;
    const col = kbCols.find(c => c.id === ph);
    showToast(`✓ <b>${co}</b> flyttad till <b>${col?.label || ph}</b>`);
    render();
    await sbPatch('pipeline', deal.id, {phase: ph});
  }
}

function kbCardClick(e, co) {
  // Don't open modal if we just finished a drag
  if (S.dragging) return;
  showDealDetail(co);
}

function renderKost() {
  const active = expenses.filter(e=>e.st==='active');
  const totalSEK = active.reduce((a,e)=>a+e.amSEK,0);
  const mrr = totalMRR();
  const margin = mrr - totalSEK;
  const marginPct = Math.round((margin/mrr)*100);

  // Group by category
  const cats = {};
  active.forEach(e => {
    if (!cats[e.cat]) cats[e.cat] = [];
    cats[e.cat].push(e);
  });

  // Sort upcoming by date
  const upcoming = [...active].sort((a,b)=>new Date(a.nextDate)-new Date(b.nextDate)).slice(0,5);
  const tlHTML = upcoming.map(e=>{
    const d = new Date(e.nextDate);
    const daysLeft = Math.round((d-new Date())/(1000*60*60*24));
    const urgent = daysLeft <= 7;
    return `<div class="tl-item" style="${urgent?'border-color:var(--warn)':''}">
      <div class="tl-date"><div class="tl-day" style="${urgent?'color:var(--warn)':''}">${d.getDate()}</div><div class="tl-mon">${d.toLocaleDateString('sv-SE',{month:'short'})}</div></div>

      <div style="text-align:right">
        <div class="tl-am" style="color:var(--err)">-${fmt(e.amSEK)}</div>
        ${urgent?`<div style="font-size:9.5px;color:var(--warn);margin-top:3px">om ${daysLeft}d</div>`:''}
      </div>
    </div>`;
  }).join('');

  // Category breakdown bars
  const catTotals = Object.entries(cats).map(([k,v])=>({cat:k,tot:v.reduce((a,e)=>a+e.amSEK,0)})).sort((a,b)=>b.tot-a.tot);
  const maxCat = catTotals[0]?.tot||1;
  const catBars = catTotals.map(ct=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="font-size:12px;min-width:140px;color:var(--dim)">${ct.cat}</div>

  // Expense rows per category
  const catSections = Object.entries(cats).map(([cat, exps])=>{
    const catTotal = exps.reduce((a,e)=>a+e.amSEK,0);
    const rows = exps.map(e=>{
      const d = new Date(e.nextDate);
      const daysLeft = Math.round((d-new Date())/(1000*60*60*24));
      const urgent = daysLeft <= 7;
      return `<tr>
        <td>
          <div style="font-weight:700;font-size:13px">${e.name}</div>
          <div style="font-size:11px;color:var(--faint);margin-top:2px">${e.note}</div>

        <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${urgent?'var(--warn)':'inherit'}">${e.nextDate}${urgent?` <span style="font-size:9px;color:var(--warn)">(!)</span>`:''}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-pur btn-sm" onclick="uploadExpenseInvoice(${e.id})" title="Ladda upp faktura för AI-analys">📄 AI</button>

  }).join('');

  return `
    <!-- STATS -->
    <div class="sgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px">
      <div class="scard c-err" style="--c-err-after:var(--err)">

        <div class="sval" style="color:var(--err)">${fmtSEK(totalSEK)}</div>
        <div class="sdelta">${active.length} abonnemang aktiva</div>
      </div>
      <div class="scard c-ok"><div class="slabel">Nettomarginal/mån</div><div class="sval" style="color:var(--ok)">${fmtSEK(margin)}</div><div class="sdelta ${marginPct>60?'up':marginPct>30?'':'dn'}">${marginPct}% marginal</div></div>
      <div class="scard c-acc"><div class="slabel">MRR (intäkter)</div><div class="sval">${fmtSEK(mrr)}</div><div class="sdelta up">↑ mot förra månaden</div></div>

        <div class="cal-hd">
          <div style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-g btn-sm" onclick="calNav(-1)">◀</button>
            <span class="cal-month">${months[m-1]} ${y}</span>
            <button class="btn btn-g btn-sm" onclick="calNav(1)">▶</button>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--acc);border-radius:2px;display:inline-block"></span>Fakturor</span>
            <span style="font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--pur);border-radius:2px;display:inline-block"></span>Möten</span>
            <button class="btn btn-p btn-sm" onclick="bookNewMeeting()">+ Boka möte</button>
          </div>
        </div>
        <div class="cal-grid">${dHeaders}${cells}</div>
      </div>
      <div class="card">
        <div class="card-hd">
          <span class="card-ht">Kommande möten</span>
          <span class="ai-pill" style="font-size:10px"><span class="ai-dot"></span>GCal live</span>
        </div>
        <div class="card-body" style="padding:10px">
          <div class="tl">${upcomingHTML||'<div style="color:var(--faint);font-size:12px;padding:8px 0">Inga kommande möten</div>'}</div>
        </div>
      </div>
    </div>`;
}

function calNav(d) {
  S.calMon+=d;
  if(S.calMon>12){S.calMon=1;S.calYear++;}
  if(S.calMon<1){S.calMon=12;S.calYear--;}
  render();
}

// ─── AI MEETING BRIEF ─────────────────────────────────────
async function showMeetingBrief(title, date, time) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">🤖 AI Meeting Brief</div>
    <div style="color:var(--dim);font-size:13px;margin-bottom:10px">${title} · ${date} kl ${time}</div>
    <div id="brief-content" style="color:var(--dim);font-size:13px;line-height:1.7">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border:2px solid var(--pur);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>AI genererar brief...</div>
    </div>
    <div style="margin-top:16px"><button class="btn btn-g" onclick="closeModal()">Stäng</button></div>`;
  document.getElementById('modal').classList.add('show');

  // Find matching client from meeting title
  const matchedClient = clients.find(c => title.toLowerCase().includes(c.n.toLowerCase().split(' ')[0].toLowerCase()));
  const clientContext = matchedClient ? `
Kund i CRM: ${matchedClient.n}
MRR: ${fmtSEK(matchedClient.mrr)} kr/mån
Kontakt: ${matchedClient.ct}
Tjänst: ${matchedClient.svc}
Projektstatus: ${matchedClient.ph}%
${invoices.filter(i=>i.cl===matchedClient.n&&i.st!=='paid').length>0?'⚠️ Har väntande/förfallna fakturor':'Inga öppna fakturor'}

Senaste aktiviteter:
${activityLog.filter(a=>a.cl===matchedClient.n).slice(0,3).map(a=>`- ${a.content} (${a.type}, ${new Date(a.at).toLocaleDateString('sv-SE')})`).join('\n')||'Inga loggade aktiviteter'}` : 'Okänd motpart — troligen ny prospect.';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Du är AI-assistent för Samify (ZicLun AB) i Kalmar. Skriv en kort och skarp mötesbrief på svenska. 
Format:
🎯 **Syfte** — vad vill vi uppnå på detta möte?
📋 **Bakgrund** — vad vet vi om motparten?
⚡ **Viktigt att driva** — 2-3 konkreta punkter
⚠️ **Bevaka** — risker eller känsliga frågor
✅ **Önskat nästa steg** — vad ska hända efter mötet?

Håll det kort och actionable. Max 200 ord totalt.`,
        messages: [{role:'user', content:`Möte: "${title}"\nDatum: ${date} kl ${time}\n\n${clientContext}`}]
      })
    });
    const data = await res.json();
    const brief = data.content?.[0]?.text || 'Kunde inte generera brief.';
    const el = document.getElementById('brief-content');
    if (el) el.innerHTML = brief.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
  } catch(e) {
    const el = document.getElementById('brief-content');
    if (el) el.innerHTML = '<span style="color:var(--err)">Kunde inte nå AI — kontrollera anslutning.</span>';
  }
}

function bookNewMeeting(prefill) {
  prefill = prefill || {};
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">📅 Boka möte</div>
    <div class="form-group"><label class="form-label">Titel</label><input class="form-input" id="bm-title" value="${prefill.title||'Samify AI x '}"></div>
    <div class="form-group"><label class="form-label">Datum</label><input class="form-input" id="bm-date" type="date" value="${prefill.date||''}"></div>
    <div style="display:flex;gap:8px">
      <div class="form-group" style="flex:1"><label class="form-label">Starttid</label><input class="form-input" id="bm-start" type="time" value="10:00"></div>
      <div class="form-group" style="flex:1"><label class="form-label">Sluttid</label><input class="form-input" id="bm-end" type="time" value="11:00"></div>
    </div>
    <div class="form-group"><label class="form-label">Gäst (e-post)</label><input class="form-input" id="bm-guest" value="${prefill.guest||''}" placeholder="kontakt@foretag.se"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-p" onclick="createGcalEvent()">📅 Skapa i Google Calendar</button>
      <button class="btn btn-g" onclick="closeModal()">Avbryt</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
}

function createGcalEvent() {
  const title=document.getElementById('bm-title').value;
  const date=document.getElementById('bm-date').value;
  const start=document.getElementById('bm-start').value;
  const end=document.getElementById('bm-end').value;
  const guest=document.getElementById('bm-guest').value;
  if(!title||!date||!start) return;
  const fmt = s => s.replace(/[-:]/g,'');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
    +`&text=${encodeURIComponent(title)}`
    +`&dates=${fmt(date+'T'+start+':00')}/${fmt(date+'T'+end+':00')}`
    +(guest?`&add=${encodeURIComponent(guest)}`:'')
    +`&details=${encodeURIComponent('Bokat via Samify CRM')}`;
  window.open(url,'_blank');
  closeModal();
  showToast('📅 Google Calendar öppnat — bekräfta och spara mötet');
}

function bookMeetingFromDeal(co) {
  closeModal();
  const deal = pipeline.find(p=>p.co===co);
  bookNewMeeting({title:`Samify AI x ${co}`, guest: deal?.email||''});
}

// ═══════════════════════════════════════════════════════
//  AI CHAT
// ═══════════════════════════════════════════════════════
async function aiSend() {
  const inp = document.getElementById('ai-in');
  if (!inp) return;
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  inp.disabled = true;

  const c = clients[S.cu];
  S.chat.push({role:'user', content:msg});

  // Show loading
  const msgs = document.getElementById('ai-msgs');
  if (msgs) {
    msgs.innerHTML += `<div class="ai-m usr">${msg}</div>`;
    msgs.innerHTML += `<div class="ai-m bot" id="ai-loading"><span style="color:var(--dim)">Analyserar${c.n}...</span></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }

  const sysPrompt = `Du är AI-affärsassistent för Samify, ett AI- och automationsbolag i Sverige (ZicLun AB).
Medgrundarna är Adnan (sälj, marknad, affärsutveckling) och Rasmus (IT, produkt, sälj).

Du har full kontext om kunden ${c.n}:
- Tjänst: ${c.svc}
- MRR: ${c.mrr} SEK/månad
- Kontaktperson: ${c.ct}
- Projektstatus: ${c.ph}% genomfört
- Avtalsstart: ${c.cs}
- Totalt avtalsvärde: ${c.cv} SEK
- Beskrivning: ${c.desc}
- Ansvarig: ${c.owner}

Ge konkreta, direkta råd på svenska om:
- Merförsäljning och upsell-möjligheter
- Nästa steg i kundrelationen  
- Nya idéer baserade på kundens profil
- Risker och möjligheter

Håll svaret kortfattat (3-5 meningar max), praktiskt och actionable.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: sysPrompt,
        messages: S.chat.map(m => ({role:m.role, content:m.content.replace(/<[^>]*>/g,'')}))
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Kunde inte nå AI just nu.';
    S.chat.push({role:'assistant', content:reply});
    const loadEl = document.getElementById('ai-loading');
    if (loadEl) loadEl.innerHTML = reply;
  } catch(e) {
    const loadEl = document.getElementById('ai-loading');
    if (loadEl) loadEl.innerHTML = 'Kunde inte nå AI. Kontrollera anslutning.';
    S.chat.push({role:'assistant', content:'Kunde inte nå AI.'});
  }

  if (inp) inp.disabled = false;
  scrollAi();
}

function scrollAi() {
  const el = document.getElementById('ai-msgs');
  if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

// ═══════════════════════════════════════════════════════
//  MODAL / TOAST
// ═══════════════════════════════════════════════════════
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;z-index:300;animation:fadeIn .2s ease;max-width:300px;line-height:1.5';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ═══════════════════════════════════════════════════════
//  DRAG & DROP FOR FAKTUROR
// ═══════════════════════════════════════════════════════
function setupDragDrop() {
  const dz = document.getElementById('dz');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const files = e.dataTransfer.files;
    if (files.length > 0) simulateFaktAI(files[0].name);
  });
}

function setupKostDrop() {
  const dz = document.getElementById('dz-kost');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const files = e.dataTransfer.files;
    if (files.length > 0) simulateExpenseAI(files[0].name);
  });
}
